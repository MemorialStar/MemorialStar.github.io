<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

    <meta name="description" content="{{ site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <!-- Open Graph -->
    <meta property="og:type" content="profile">
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/img/me.jpg' | absolute_url }}">
    <meta property="og:locale" content="en_US">
    <meta property="og:locale:alternate" content="ko_KR">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ site.title }}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ '/assets/img/me.jpg' | absolute_url }}">

    <!-- JSON-LD Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}",
      "inLanguage": "en",
      "affiliation": {
        "@type": "EducationalOrganization",
        "name": "KAIST"
      },
      "sameAs": [
        "https://www.linkedin.com/in/j0min/",
        "https://x.com/young_min_Jung"
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="{{ site.data.site_info.favicon | relative_url }}">
    <link rel="stylesheet" href="{{ 'assets/css/style.css' | relative_url }}">
</head>
<body>
    <!-- Shown below 1024px; the responsive layout is not built yet. -->
    <div class="desktop-only-notice" role="alert">
        <p>This site is best viewed on a desktop (≥1024px). A mobile-friendly version is in progress.</p>
    </div>

    <!-- Page Wrapper -->
    <div class="page-wrapper">
        <!-- background layer -->
        <div class="background-image-layer"></div>
        <!-- Left Pink Margin -->
        <div class="left-margin"></div>
        
        <!-- Right Pink Margin -->
        <div class="right-margin"></div>
        
        <!-- Main Container -->
        <div class="main-container">
            <!-- Sky Blue Gap -->
            <div class="sky-blue-gap"></div>
            
            <!-- Content Wrapper -->
            <div class="content-wrapper">
                <!-- Right Content Column -->
                <main class="content-column">
                    <div class="content-area" id="contentArea">
                        {{ content }}
                    </div>
                </main>
            </div>

            <!-- Right Margin in Main Container -->
            <div class="main-container-right-margin"></div>
        </div>
    </div>
    
    <!-- Fixed Navigation Column -->
    <nav class="nav-column">
        <!-- Vertical Divider Line inside yellow column -->
        <div class="vertical-divider" id="verticalDivider"></div>
        
        <div class="nav-container" id="navsubContainer"></div>

        <div class="nav-container" id="navContainer">
            <button class="nav-item active" data-section="1" type="button" aria-current="page">
                <span>Main</span>
            </button>
            <button class="nav-item" data-section="2" type="button">
                <span>Vision</span>
            </button>
            <button class="nav-item" data-section="3" type="button">
                <span>Projects</span>
            </button>
            <button class="nav-item" data-section="4" type="button">
                <span>Publications</span>
            </button>
        </div>
    </nav>
    
    <!-- Jekyll 데이터를 JavaScript로 안전하게 전달 -->
    <script type="application/json" id="jekyll-data">
        {
            "siteInfo": {{ site.data.site_info | jsonify }},
            "projects": {{ site.data.projects | jsonify }},
            "publications": {{ site.data.publications | jsonify }},
            "news": {{ site.data.news | jsonify }},
            "sections": {{ site.data.sections | jsonify }}
        }
    </script>
    
    <script>
        // JSON 데이터를 안전하게 파싱
        window.jekyllData = JSON.parse(document.getElementById('jekyll-data').textContent);
    </script>
    
    <script src="{{ 'assets/js/main.js' | relative_url }}"></script>
</body>
</html>
